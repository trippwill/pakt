name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -coverprofile=coverage.out

      - name: Lint
        uses: golangci/golangci-lint-action@v7

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync('go tool cover -func=coverage.out | grep total').toString().trim();
            const match = output.match(/([\d.]+)%/);
            const pct = match ? match[1] : 'unknown';
            await core.summary
              .addHeading('Go Coverage')
              .addRaw(`Total: **${pct}%**`)
              .write();

  dotnet:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: dotnet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Verify benchmarks compile
        run: dotnet build benchmarks/Pakt.Benchmarks -c Release

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          directory: dotnet/TestResults
          flags: dotnet
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsDir = 'dotnet/TestResults';
            let summary = 'Coverage report generated';
            try {
              const dirs = fs.readdirSync(resultsDir, { withFileTypes: true })
                .filter(d => d.isDirectory());
              if (dirs.length > 0) {
                const covFile = path.join(resultsDir, dirs[0].name, 'coverage.cobertura.xml');
                if (fs.existsSync(covFile)) {
                  const content = fs.readFileSync(covFile, 'utf8');
                  const match = content.match(/line-rate="([\d.]+)"/);
                  if (match) {
                    const pct = (parseFloat(match[1]) * 100).toFixed(1);
                    summary = `Line coverage: **${pct}%**`;
                  }
                }
              }
            } catch (e) { /* fallback */ }
            await core.summary
              .addHeading('.NET Coverage')
              .addRaw(summary)
              .write();
